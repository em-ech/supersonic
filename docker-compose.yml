services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: supersonic_user
      POSTGRES_PASSWORD: supersonic_pass
      POSTGRES_DB: supersonic_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supersonic_user -d supersonic_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    env_file: .env
    ports:
      - "8002:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
